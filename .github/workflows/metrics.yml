# ════════════════════════════════════════════════════════════════
#  📊 GITHUB METRICS — full dashboard: langs, activity, calendar,
#  achievements, traffic, follow-up, isocalendar & more.
#  Requires a PAT stored as secret `METRICS_TOKEN` (repo + user scopes)
# ════════════════════════════════════════════════════════════════
name: 📊 Metrics Dashboard

on:
  schedule:
    - cron: "0 0 * * *"          # daily at midnight UTC
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # ── 1. Language + activity overview ─────────────────────────
      - name: 🌐 Languages & Activity
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/metrics.main.svg
          config_display: large
          config_padding: 6, 8 + 10%
          base: header, activity, community, repositories, metadata
          plugin_lines: yes
          plugin_followup: yes
          plugin_followup_archived: yes
          plugin_traffic: yes
          plugin_languages: yes
          plugin_languages_limit: 12
          plugin_languages_ignored: html, css, dockerfile, makefile
          plugin_languages_details: bytes-size, percentage, lines
          plugin_languages_sections: most-used, recently
          plugin_languages_indepth: yes
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_display: compact
          plugin_achievements_limit: 0
          commits_authoring: AyushKumarMishra5, ayushkmishra22aug

      # ── 2. Iso calendar + contribution graph ────────────────────
      - name: 📅 Iso Calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/metrics.calendar.svg
          config_padding: 6, 8 + 10%
          base: ""
          plugin_isocalendar: yes

      # ── 3. Stars / forks / repo digest ──────────────────────────
      - name: ⭐ Repository Digest
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/metrics.stargazers.svg
          config_padding: 6, 8 + 10%
          base: ""
          plugin_stargazers: yes
          plugin_stargazers_charts: yes
          plugin_stargazers_charts_type: classic

      # ── 4. Commit to output branch ──────────────────────────────
      - name: 🚀 Push assets
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh metrics dashboard"
          file_pattern: "assets/*.svg"
